        &lt;listener class-name="listeners.TestListener"/&gt;
    &lt;/listeners&gt;
    &lt;test name="Regression"&gt;
        &lt;classes&gt;
            &lt;class name="tests.LoginTest"/&gt;
        &lt;/classes&gt;
    &lt;/test&gt;
&lt;/suite&gt;</pre></div>
<h2>Other listener interfaces worth knowing</h2>
<div class="tbl-wrap">
<table class="cmp">
<tr><th>Interface</th><th>Fires around…</th></tr>
<tr><td><code>ITestListener</code></td><td>Individual @Test method events (start, pass, fail, skip)</td></tr>
<tr><td><code>ISuiteListener</code></td><td>The whole suite starting/finishing</td></tr>
<tr><td><code>IInvokedMethodListener</code></td><td>Every method invocation — including @Before/@After, not just @Test</td></tr>
<tr><td><code>IAnnotationTransformer</code></td><td>Modifying annotation attributes at runtime (e.g. injecting a retry analyzer into every test)</td></tr>
<tr><td><code>IReporter</code></td><td>Generating a fully custom report after the run finishes</td></tr>
</table>
</div>
<h2>Real use case: auto-attaching a screenshot on every failure</h2>
<p>This is the single most common reason listeners appear in real frameworks — instead of remembering to add screenshot code to every test, <code class="inline">onTestFailure()</code> handles it globally, once, for the entire suite.</p>
<div class="callout tip">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
  <div class="body"><b>Why this matters for interviews</b><p>Listeners are a strong signal of framework maturity. Being able to explain "I used <code class="inline">ITestListener.onTestFailure()</code> to auto-capture a screenshot and attach it to the Extent Report" demonstrates you've built (or worked deeply in) a real framework, not just written individual test scripts.</p></div>
</div>
<div class="callout interview">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <div class="body"><b>Likely interview question</b><p>"How does your framework capture a screenshot automatically when a test fails?" — Implement <code class="inline">ITestListener</code>, override <code class="inline">onTestFailure(ITestResult result)</code>, grab the current thread's WebDriver, cast it to <code class="inline">TakesScreenshot</code>, and save the file — then register the listener in testng.xml so it applies to every test.</p></div>
</div>
</div>
`},
{id:'retry-analyzer', group:'g5', num:16, title:'Retry Analyzer', dek:'Automatically re-running a test that failed due to flakiness — without masking real bugs.',
html:`
<div class="prose">
<h2>Why retries exist</h2>
<p>UI automation has a class of failures that are <strong>environmental, not logical</strong> — a slow network causing an element to load a second late, a transient animation, a momentarily unresponsive Grid node. Retrying a genuinely flaky test once or twice can filter out this noise, as long as it's not used to hide real, reproducible bugs.</p>
<h2>Implementing IRetryAnalyzer</h2>
<div class="code-block">
<div class="code-head"><div class="fname">RetryAnalyzer.java</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">public class RetryAnalyzer implements IRetryAnalyzer {

    private int retryCount = 0;
    private static final int MAX_RETRY = 2;

    @Override
    public boolean retry(ITestResult result) {
        if (retryCount < MAX_RETRY) {
            retryCount++;
            return true;   // tells TestNG to run this test again
        }
        return false;      // give up, report as failed
    }
}</pre>
</div>
<div class="code-block">
<div class="code-head"><div class="fname">LoginTest.java</div></div><pre class="code">@Test(retryAnalyzer = RetryAnalyzer.class)
public void loginTest() {
    // flaky-prone UI step
}</pre></div>
<h2>Applying it to every test automatically</h2>
<p>Manually adding <code class="inline">retryAnalyzer = RetryAnalyzer.class</code> to every method is easy to forget. The standard fix is an <code class="inline">IAnnotationTransformer</code> listener that injects it globally:</p>
<div class="code-block"><div class="code-head"><div class="fname">RetryTransformer.java</div></div><pre class="code">public class RetryTransformer implements IAnnotationTransformer {
    @Override
    public void transform(ITestAnnotation annotation, Class testClass,
                           Constructor testConstructor, Method testMethod) {
        annotation.setRetryAnalyzer(RetryAnalyzer.class);
    }
}</pre></div>
<div class="callout pitfall">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <div class="body"><b>Interview red flag to avoid</b><p>Blindly retrying every failure 3-4 times can hide real regressions and slow the suite down significantly. A mature answer mentions tracking retry counts in the report so genuinely flaky tests get investigated and fixed, not silently retried forever.</p></div>
</div>
</div>
`},

{id:'invocation-count', group:'g5', num:17, title:'Invocation Count', dek:'Running the exact same test method N times in a row — useful for spotting flakiness and load-style checks.',
html:`
<div class="prose">
<h2>What it does</h2>
<p><code class="inline">invocationCount</code> tells TestNG to run a single <code class="inline">@Test</code> method a fixed number of times — not with different data (that's DataProvider), just the same test, repeated. Common uses: proving a flaky test is actually stable, or a lightweight repeated load check.</p>
<div class="code-block">
<div class="code-head"><div class="fname">InvocationDemo.java</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">@Test(invocationCount = 5)
public void searchReturnsResults() {
    driver.findElement(By.id("search")).sendKeys("laptop");
    driver.findElement(By.id("searchBtn")).click();
    Assert.assertTrue(driver.findElements(By.className("result")).size() > 0);
}</pre>
</div>
<p>This runs <code class="inline">searchReturnsResults()</code> five separate times, each counted individually in the report — so 3 passes and 2 failures out of 5 runs is visible at a glance.</p>
<h2>Combining with successPercentage</h2>
<p>Sometimes a test only needs to pass <em>most</em> of the time to be considered acceptable (useful for genuinely flaky third-party integrations):</p>
<div class="code-block"><div class="code-head"><div class="fname">SuccessPercentage.java</div></div><pre class="code">@Test(invocationCount = 10, successPercentage = 80)
public void thirdPartyWidgetLoads() {
    // considered an overall PASS if at least 8/10 invocations succeed
}</pre></div>
<h2>invocationTimeOut</h2>
<p>Caps the <strong>total</strong> time allowed across all invocations combined:</p>
<div class="code-block"><div class="code-head"><div class="fname">InvocationTimeout.java</div></div><pre class="code">@Test(invocationCount = 5, invocationTimeOut = 10000)
public void quickCheck() {
    // all 5 invocations together must finish within 10 seconds
}</pre></div>
<div class="callout interview">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <div class="body"><b>Likely interview question</b><p>"What's the difference between <code class="inline">invocationCount</code> and a DataProvider loop?" — <code class="inline">invocationCount</code> repeats the exact same test with the same inputs N times; DataProvider runs the same test logic with <em>different</em> inputs per row. They solve different problems: repetition vs data variation.</p></div>
</div>
</div>
`},

{id:'timeout', group:'g5', num:18, title:'TimeOut', dek:'Failing a hung test automatically instead of letting it stall the whole suite indefinitely.',
html:`
<div class="prose">
<h2>Why timeouts matter in Selenium suites</h2>
<p>A browser test can hang — a page that never finishes loading, an element wait that never resolves. Without a timeout, one broken test can silently block an entire CI pipeline. <code class="inline">timeOut</code> on <code class="inline">@Test</code> forces TestNG to fail the test (rather than hang forever) once the limit is hit.</p>
<div class="code-block">
<div class="code-head"><div class="fname">TimeoutDemo.java</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">@Test(timeOut = 5000)   // milliseconds
public void checkoutShouldCompleteQuickly() {
    driver.findElement(By.id("checkoutBtn")).click();
    wait.until(ExpectedConditions.visibilityOfElementLocated(By.id("confirmation")));
}</pre>
</div>
<p>If this test takes longer than 5000ms (5 seconds) to complete, TestNG interrupts it and marks it as <strong>FAILED</strong> with a <code class="inline">org.testng.internal.thread.ThreadTimeoutException</code> — instead of letting the suite hang.</p>
<h2>Suite-wide default timeout</h2>
<p>Rather than setting it per method, a sane default can be applied to the whole suite in testng.xml:</p>
<div class="code-block"><div class="code-head"><div class="fname">testng.xml (snippet)</div></div><pre class="code">&lt;suite name="Suite" time-out="60000"&gt;</pre></div>
<div class="callout pitfall">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <div class="body"><b>Don't confuse this with WebDriver waits</b><p><code class="inline">timeOut</code> is a TestNG-level safety net for the whole method — it is not a substitute for proper <code class="inline">WebDriverWait</code>/explicit waits inside your Selenium code. Rely on explicit waits for normal synchronization; use <code class="inline">timeOut</code> as the outer guard against a fully hung test.</p></div>
</div>
</div>
`},

{id:'threadpoolsize', group:'g5', num:19, title:'ThreadPoolSize', dek:'Parallelizing invocations of a single test method — a more granular cousin of suite-level parallel execution.',
html:`
<div class="prose">
<h2>What it does</h2>
<p><code class="inline">threadPoolSize</code> runs multiple <strong>invocations of one method</strong> concurrently, using a pool of threads. It only makes sense combined with <code class="inline">invocationCount</code> — it tells TestNG how many of those repeated invocations to run <em>at the same time</em> rather than one after another.</p>
<div class="code-block">
<div class="code-head"><div class="fname">ThreadPoolDemo.java</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">@Test(invocationCount = 10, threadPoolSize = 5)
public void searchIsStableUnderLoad() {
    // 10 total invocations, but only 5 run concurrently at any moment
}</pre>
</div>
<h2>threadPoolSize vs parallel="methods" — the distinction interviewers check</h2>
<div class="tbl-wrap">
<table class="cmp">
<tr><th></th><th><code>threadPoolSize</code></th><th><code>parallel="methods"</code> (testng.xml)</th></tr>
<tr><td>Scope</td><td>Multiple invocations of ONE method</td><td>Different, distinct @Test methods across the suite</td></tr>
<tr><td>Requires</td><td><code>invocationCount</code> on the same method</td><td>The <code>parallel</code> attribute on &lt;suite&gt; and a <code>thread-count</code></td></tr>
<tr><td>Typical use</td><td>Lightweight concurrency/stress checks on a single action</td><td>Speeding up the whole regression suite</td></tr>
</table>
</div>
<div class="callout tip">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
  <div class="body"><b>Thread-safety still applies</b><p>Exactly like suite-level parallel execution, concurrent invocations under <code class="inline">threadPoolSize</code> must not share a single WebDriver instance — the same <code class="inline">ThreadLocal&lt;WebDriver&gt;</code> pattern from the Parallel Execution topic applies here too.</p></div>
</div>
<div class="callout interview">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <div class="body"><b>Likely interview question</b><p>"Can you use threadPoolSize without invocationCount?" — No. <code class="inline">threadPoolSize</code> only controls concurrency <em>among repeated invocations</em> of the same method — without <code class="inline">invocationCount</code>, there's nothing to parallelize, and TestNG will throw a configuration error.</p></div>
</div>
</div>
`},
{id:'best-practices', group:'g6', num:20, title:'Best Practices', dek:'The habits that separate a maintainable Selenium + TestNG framework from a folder of brittle scripts.',
html:`
<div class="prose">
<h2>Test design</h2>
<ul>
<li><strong>Keep tests independent.</strong> Each test should be runnable on its own, in any order, without depending on leftover state from another test.</li>
<li><strong>One logical assertion focus per test.</strong> A test named <code class="inline">verifyLogin()</code> shouldn't also silently verify the shopping cart — split them.</li>
<li><strong>Use the Page Object Model</strong> to separate element locators/page interactions from test logic — this is close to non-negotiable in real frameworks (see the Framework Architecture topic).</li>
<li><strong>Prefer explicit waits</strong> (<code class="inline">WebDriverWait</code>) over <code class="inline">Thread.sleep()</code> — hardcoded sleeps make suites slow and still flaky.</li>
</ul>
<h2>TestNG configuration</h2>
<ul>
<li><strong>Use groups deliberately</strong> (smoke/regression/sanity) so CI can run the right subset for the right situation.</li>
<li><strong>Drive configuration through testng.xml</strong>, not hardcoded values, so environment/browser changes don't require recompiling.</li>
<li><strong>Use ThreadLocal&lt;WebDriver&gt;</strong> from day one if there's any chance the suite will run in parallel later — retrofitting it after the fact is painful.</li>
<li><strong>Register listeners centrally</strong> (screenshots, logging) instead of duplicating that logic inside every test.</li>
</ul>
<h2>Assertions &amp; reliability</h2>
<ul>
<li><strong>Use soft assertions</strong> when validating multiple independent fields on one page, so one run surfaces every problem.</li>
<li><strong>Add meaningful assertion messages</strong> — <code class="inline">Assert.assertEquals(actual, expected, "message")</code> — so a failing report is self-explanatory without opening the code.</li>
<li><strong>Use Retry Analyzer sparingly</strong> and track retry counts — a test that "passes on retry" every single run is masking a real bug, not being flaky.</li>
</ul>
<h2>Reporting &amp; maintainability</h2>
<ul>
<li><strong>Auto-capture screenshots on failure</strong> via a listener, so failures are debuggable without re-running.</li>
<li><strong>Integrate with a richer report library</strong> (like ExtentReports or Allure) layered on top of TestNG's default HTML report for stakeholders who aren't developers.</li>
<li><strong>Version-control test data</strong> (Excel/CSV/JSON) alongside the code so data changes are reviewable, like code changes.</li>
</ul>
<div class="callout tip">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
  <div class="body"><b>The one-sentence version</b><p>If asked "what makes a good automation framework?" in an interview: independent tests, explicit waits, Page Object Model, externalized config and data, thread-safe parallel execution, and automatic failure diagnostics (screenshots + clear reports).</p></div>
</div>
</div>
`},

{id:'common-mistakes', group:'g6', num:21, title:'Common Mistakes', dek:'The recurring bugs and anti-patterns that show up in almost every real TestNG + Selenium codebase — know these and you will spot them fast.',
html:`
<div class="prose">
<h2>Lifecycle &amp; structure mistakes</h2>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Using @BeforeClass to open the browser "for speed," then writing tests that secretly depend on execution order.</b><p>Symptoms: tests pass individually but fail when the whole suite runs, or fail only in a certain order. Fix: use @BeforeMethod for anything that must be isolated per test.</p></div></div>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Overusing dependsOnMethods to force ordering.</b><p>If tests are chained purely to control order rather than genuine business dependency, use <code class="inline">priority</code> instead — dependsOnMethods should represent real "step 2 needs step 1" logic, not convenience ordering.</p></div></div>

<h2>Assertion mistakes</h2>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Forgetting softAssert.assertAll().</b><p>Without it, every soft-assertion failure is silently swallowed and the test reports PASSED. This is the single most common soft-assert bug in real codebases.</p></div></div>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Wrong argument order in assertEquals.</b><p><code class="inline">Assert.assertEquals(actual, expected)</code> — actual comes first. Swapping them still catches the failure, but the report's "expected vs actual" message reads backwards and misleads whoever debugs it later.</p></div></div>

<h2>Parallel execution mistakes</h2>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>A shared/static WebDriver field with parallel="methods" or "classes" enabled.</b><p>Multiple threads drive the same browser simultaneously, producing bizarre, hard-to-reproduce failures. Always use <code class="inline">ThreadLocal&lt;WebDriver&gt;</code> once parallel execution is on.</p></div></div>

<h2>Wait &amp; timing mistakes</h2>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Reaching for Thread.sleep(5000) instead of an explicit wait.</b><p>Makes the suite unnecessarily slow (always waits the full 5s) and still flaky (5s isn't always enough). Use <code class="inline">WebDriverWait</code> with <code class="inline">ExpectedConditions</code> instead.</p></div></div>

<h2>Retry &amp; reliability mistakes</h2>
<div class="callout pitfall"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
<div class="body"><b>Setting a high retry count to make a red build go green.</b><p>Retries should surface genuinely intermittent infrastructure issues, not paper over a real, reproducible bug. If a test needs 3 retries to pass every single run, that's a bug to fix, not a flake to tolerate.</p></div></div>

<div class="callout interview">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <div class="body"><b>Likely interview question</b><p>"Tell me about a bug you found in your own automation framework." — This list is exactly the kind of concrete, specific answer that question is fishing for. Pick one (e.g. the shared-WebDriver-under-parallel-execution bug) and describe symptom → root cause → fix.</p></div>
</div>
</div>
`},
{id:'architecture', group:'g6', num:24, title:'Real Company Framework Architecture', dek:'How the 23 pieces you just learned actually get assembled into a production-grade Selenium + TestNG framework.',
html:`
<div class="prose">
<h2>The layered architecture</h2>
<p>Almost every serious Selenium + TestNG framework in industry follows the same layered shape, regardless of company. Here's a realistic project structure using the <strong>Page Object Model</strong>:</p>
<div class="ftree">
<div><span class="d">src/test/java/</span></div>
<div>├── <span class="d">base/</span></div>
<div>│&nbsp;&nbsp;&nbsp;└── <span class="f">BaseTest.java</span> <span class="cm">// driver init, teardown, shared setup</span></div>
<div>├── <span class="d">pages/</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">LoginPage.java</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">DashboardPage.java</span></div>
<div>│&nbsp;&nbsp;&nbsp;└── <span class="f">CheckoutPage.java</span></div>
<div>├── <span class="d">tests/</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">LoginTest.java</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">CheckoutTest.java</span></div>
<div>│&nbsp;&nbsp;&nbsp;└── <span class="f">SearchTest.java</span></div>
<div>├── <span class="d">listeners/</span></div>
<div>│&nbsp;&nbsp;&nbsp;└── <span class="f">TestListener.java</span> <span class="cm">// screenshots, custom reporting</span></div>
<div>├── <span class="d">utils/</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">DriverManager.java</span> <span class="cm">// ThreadLocal&lt;WebDriver&gt;</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">ExcelUtils.java</span> <span class="cm">// data-provider source</span></div>
<div>│&nbsp;&nbsp;&nbsp;├── <span class="f">ConfigReader.java</span> <span class="cm">// reads config.properties</span></div>
<div>│&nbsp;&nbsp;&nbsp;└── <span class="f">RetryAnalyzer.java</span></div>
<div>└── <span class="d">dataproviders/</span></div>
<div>&nbsp;&nbsp;&nbsp;&nbsp;└── <span class="f">DataProviders.java</span></div>
<div><span class="d">src/test/resources/</span></div>
<div>├── <span class="f">testng.xml</span></div>
<div>├── <span class="f">config.properties</span></div>
<div>└── <span class="f">testdata/login.xlsx</span></div>
<div><span class="f">pom.xml</span></div>
</div>
<h2>What each layer is responsible for</h2>
<div class="tbl-wrap">
<table class="cmp">
<tr><th>Layer</th><th>Responsibility</th></tr>
<tr><td><code>base/BaseTest</code></td><td>Shared @BeforeMethod/@AfterMethod driver setup every test class extends</td></tr>
<tr><td><code>pages/</code></td><td>Page Object Model — locators + page actions, zero assertions</td></tr>
<tr><td><code>tests/</code></td><td>@Test methods calling page objects, holding the actual assertions</td></tr>
<tr><td><code>listeners/</code></td><td>Cross-cutting concerns — screenshots on failure, custom reporting</td></tr>
<tr><td><code>utils/</code></td><td>ThreadLocal driver management, Excel/config readers, retry logic</td></tr>
<tr><td><code>dataproviders/</code></td><td>Centralised, reusable @DataProvider methods</td></tr>
<tr><td><code>testng.xml</code></td><td>Suite composition — groups, parallelism, parameters, listeners</td></tr>
</table>
</div>
<h2>A realistic BaseTest + Page Object + Test, wired together</h2>
<div class="code-block">
<div class="code-head"><div class="fname">BaseTest.java</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">public class BaseTest {

    @BeforeMethod
    @Parameters("browser")
    public void setUp(@Optional("chrome") String browser) {
        WebDriver driver = browser.equalsIgnoreCase("firefox")
                ? new FirefoxDriver() : new ChromeDriver();
        driver.manage().timeouts().implicitlyWait(Duration.ofSeconds(5));
        DriverManager.setDriver(driver);
        DriverManager.getDriver().get(ConfigReader.get("baseUrl"));
    }

    @AfterMethod
    public void tearDown() {
        DriverManager.getDriver().quit();
        DriverManager.unload();
    }
}</pre>
</div>
<div class="code-block">
<div class="code-head"><div class="fname">LoginPage.java</div></div>
<pre class="code">public class LoginPage {
    WebDriver driver = DriverManager.getDriver();
    By emailField = By.id("email");
    By passwordField = By.id("password");
    By submitBtn = By.id("submit");

    public void login(String email, String password) {
        driver.findElement(emailField).sendKeys(email);
        driver.findElement(passwordField).sendKeys(password);
        driver.findElement(submitBtn).click();
    }
}</pre></div>
<div class="code-block">
<div class="code-head"><div class="fname">LoginTest.java</div></div>
<pre class="code">@Listeners(TestListener.class)
public class LoginTest extends BaseTest {

    @Test(dataProvider = "loginData", dataProviderClass = DataProviders.class,
          groups = { "smoke", "regression" })
    public void loginTest(String email, String password, boolean expected) {
        new LoginPage().login(email, password);
        boolean loggedIn = DriverManager.getDriver()
                .findElements(By.id("dashboard")).size() > 0;
        Assert.assertEquals(loggedIn, expected);
    }
}</pre></div>
<h2>The master testng.xml tying it all together</h2>
<div class="code-block">
<div class="code-head"><div class="fname">testng.xml</div><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre class="code">&lt;suite name="MasterSuite" parallel="classes" thread-count="4"&gt;
    &lt;listeners&gt;
        &lt;listener class-name="listeners.TestListener"/&gt;
    &lt;/listeners&gt;

    &lt;test name="ChromeRegression"&gt;
        &lt;parameter name="browser" value="chrome"/&gt;
        &lt;groups&gt;
            &lt;run&gt;
                &lt;include name="regression"/&gt;
            &lt;/run&gt;
        &lt;/groups&gt;
        &lt;classes&gt;
            &lt;class name="tests.LoginTest"/&gt;
            &lt;class name="tests.CheckoutTest"/&gt;
            &lt;class name="tests.SearchTest"/&gt;
        &lt;/classes&gt;
    &lt;/test&gt;
&lt;/suite&gt;</pre></div>
<h2>Where this connects to CI/CD</h2>
<p>Jenkins or GitHub Actions typically runs <code class="inline">mvn clean test -DsuiteXmlFile=testng.xml</code> on every push, then archives <code class="inline">test-output/index.html</code> (or an Extent/Allure report layered on top) as a build artifact — so every commit produces a traceable, shareable pass/fail record automatically.</p>
<div class="callout interview">
  <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <div class="body"><b>Likely interview question</b><p>"Walk me through your framework architecture." — Narrate exactly this: BaseTest for shared setup, Page Objects for element interaction, test classes for assertions, listeners for cross-cutting concerns, utils for driver/config/data management, and testng.xml as the single control point for what runs, how, and in what parallelism.</p></div>
</div>
</div>
`},
{id:'interview-qa', group:'g6', num:22, title:'Interview Questions', dek:'25 real interview questions with concise, correct answers. Tap any question to reveal the answer.', type:'interview'},

{id:'quiz', group:'g6', num:23, title:'Quiz', dek:'15 questions to test what actually stuck. Instant feedback, styled like a TestNG assertion result.', type:'quiz'},
// TOPIC_INSERT_MARKER
];  // END_TOPICS

const QA_DATA = [
{q:"What is TestNG and how is it different from a unit testing library like JUnit?", a:"TestNG (Test Next Generation) is a Java testing framework inspired by JUnit and NUnit, built to add features large test suites need natively: flexible grouping, dependencies between tests, data-driven testing via DataProvider, native parallel execution, soft assertions, and a retry mechanism — most of which JUnit either lacks or requires extra configuration for."},
{q:"What is the correct execution order of TestNG annotations?", a:"@BeforeSuite → @BeforeTest → @BeforeClass → @BeforeMethod → @Test → @AfterMethod → @AfterClass → @AfterTest → @AfterSuite. Before-annotations fire outside-in (widest scope first); After-annotations fire inside-out (narrowest scope first)."},
{q:"What's the difference between @BeforeMethod and @BeforeClass?", a:"@BeforeMethod runs before every single @Test method in the class. @BeforeClass runs only once, before the very first @Test method in that class — regardless of how many test methods it contains."},
{q:"What's the difference between @BeforeTest and @BeforeClass?", a:"@BeforeClass is scoped to a single Java class. @BeforeTest is scoped to a <test> tag in testng.xml, which can span multiple classes — so it runs once per <test> tag, not once per class."},
{q:"What does the priority attribute do, and what's the default value?", a:"It controls the order @Test methods execute in — lower numbers run first. The default priority is 0. Methods sharing the same priority fall back to alphabetical order by method name."},
{q:"Does priority stop a test from running if an earlier-priority test fails?", a:"No. Priority only controls order, not conditional execution. A later test still runs even if an earlier-priority test failed. To make one test conditional on another passing, use dependsOnMethods instead."},
{q:"What's the difference between a hard assertion and a soft assertion?", a:"A hard assertion (org.testng.Assert) throws immediately on failure and stops the test method right there. A soft assertion (org.testng.asserts.SoftAssert) records the failure but lets the test keep running, reporting all collected failures together — but only if you call softAssert.assertAll() at the end."},
{q:"What happens if you forget to call assertAll() after using SoftAssert?", a:"The test is reported as PASSED even if soft assertions inside it failed, because assertAll() is what actually raises the collected failures to TestNG. This is the most common soft-assertion bug in real codebases."},
{q:"What is testng.xml used for?", a:"It's the suite configuration file — it defines which classes/methods to run, in what groups, with what parameters, what parallelism, and which listeners are active, all without touching Java code. It's typically what CI pipelines point at to run a suite."},
{q:"What happens to a test that depends on a method that failed?", a:"It's marked SKIPPED, not failed — and if other tests depend on that skipped test in turn, they cascade to SKIPPED as well. This correctly points back to one root-cause failure instead of producing several misleading failures."},
{q:"How do you make a dependent test run even if its dependency failed?", a:"Add alwaysRun = true to the @Test annotation, e.g. @Test(dependsOnMethods = \"login\", alwaysRun = true) — common for cleanup/logout steps that must run regardless of outcome."},
{q:"What are TestNG groups used for?", a:"Tagging tests (e.g. smoke, regression, sanity) so a run can include or exclude specific tags via testng.xml, letting one codebase serve different testing needs (fast pre-commit checks vs full nightly regression) without duplicating tests."},
{q:"What's the difference between @Parameters and @DataProvider?", a:"@Parameters pulls a single, fixed value per run from testng.xml — good for config like browser or environment. @DataProvider supplies multiple rows of data from a Java method, and the test runs once per row — good for data-driven scenarios like many login combinations."},
{q:"How would you implement data-driven testing for a login form with 20 credential combinations?", a:"Write a @DataProvider method returning an Object[][] (often built by reading an Excel/CSV/JSON file), then annotate the test method with @Test(dataProvider = \"...\") — TestNG automatically runs the method once per row, reporting each as a separate result."},
{q:"What are the parallel modes available in testng.xml, and what does each parallelize?", a:"methods (every @Test method runs on its own thread), classes (each class runs on its own thread), tests (each <test> tag runs on its own thread), and instances (each instance of a class, relevant with factories)."},
{q:"Why is a shared static WebDriver dangerous with parallel execution?", a:"Multiple threads would drive the same browser instance simultaneously — one thread navigating while another asserts — producing flaky, hard-to-reproduce failures. The fix is ThreadLocal<WebDriver> so each thread gets its own isolated browser instance."},
{q:"What is a TestNG listener, and name one interface you'd implement?", a:"A listener is a class that hooks into TestNG's lifecycle events. ITestListener is the most common — overriding onTestFailure(), for example, lets you auto-capture a screenshot every time any test fails, without adding that code to every test method."},
{q:"How do you register a listener so it applies to the whole suite?", a:"Either annotate the test class with @Listeners(TestListener.class), or — more common in real frameworks — declare it once in testng.xml under <listeners><listener class-name=\"...\"/></listeners> so it applies suite-wide."},
{q:"What is a Retry Analyzer and when should you use it?", a:"A class implementing IRetryAnalyzer that tells TestNG to re-run a failed test up to N times, used to absorb genuinely environmental flakiness (slow network, transient load). It should not be used to mask a real, reproducible bug — retry counts should be tracked and investigated."},
{q:"What's the difference between invocationCount and a DataProvider?", a:"invocationCount repeats the exact same test with the same inputs N times in a row — useful for checking stability. A DataProvider runs the same test logic with different inputs per row — useful for data variation. They solve different problems."},
{q:"What does the timeOut attribute on @Test do?", a:"It fails the test automatically if it runs longer than the specified milliseconds, preventing one hung test (e.g. an element that never loads) from stalling the entire suite indefinitely."},
{q:"What's the difference between threadPoolSize and parallel=\"methods\"?", a:"threadPoolSize parallelizes multiple invocations of ONE method (and requires invocationCount to be set). parallel=\"methods\" in testng.xml parallelizes different, distinct @Test methods across the whole suite. Different scopes, different purposes."},
{q:"How do you run only a subset of tests without modifying code?", a:"Use testng.xml — either the <groups><run><include name=\"...\"/></run></groups> block to filter by group, or list only the specific <class>/<methods> you want in the <classes> section."},
{q:"What's the Page Object Model and why is it used with TestNG + Selenium?", a:"A design pattern where each web page gets its own class holding its locators and interaction methods, separate from test logic. Tests call page object methods instead of raw Selenium calls, so a UI change only requires updating one page class instead of every test that touches that page."},
{q:"How would you explain your overall framework architecture in an interview?", a:"A layered structure: a BaseTest with shared @BeforeMethod/@AfterMethod setup, Page Objects encapsulating element interactions, test classes holding the actual assertions, listeners handling cross-cutting concerns like screenshots, utility classes managing the ThreadLocal driver/config/data, and testng.xml as the single control point for what runs, in what groups, and with what parallelism."},
]; // END_QA

const QUIZ_DATA = [
{q:"Which annotation runs exactly once, before every test in the entire testng.xml suite?", opts:["@BeforeTest","@BeforeSuite","@BeforeClass","@BeforeMethod"], correct:1, explain:"@BeforeSuite is the widest scope — it runs once for the whole suite, before @BeforeTest, @BeforeClass, or @BeforeMethod."},
{q:"What is the default priority value if none is specified on @Test?", opts:["1","-1","0","100"], correct:2, explain:"The default priority is 0. Lower numbers run first; ties are broken alphabetically by method name."},
{q:"Which class provides soft assertions in TestNG?", opts:["org.testng.Assert","org.testng.asserts.SoftAssert","org.testng.SoftCheck","org.testng.annotations.Soft"], correct:1, explain:"org.testng.asserts.SoftAssert collects failures without stopping the test; you must call assertAll() to actually report them."},
{q:"A test depends on another test via dependsOnMethods. The dependency FAILS. What happens to the dependent test?", opts:["It also fails","It is skipped","It runs normally","It throws a compile error"], correct:1, explain:"TestNG marks it SKIPPED, not failed — cleanly indicating the root cause was upstream rather than producing a misleading separate failure."},
{q:"What must you call at the end of a method using SoftAssert for failures to actually be reported?", opts:["softAssert.verify()","softAssert.finish()","softAssert.assertAll()","softAssert.report()"], correct:2, explain:"Without assertAll(), collected soft-assertion failures are never raised, and the test is incorrectly reported as PASSED."},
{q:"Which testng.xml tag lets you run only tests tagged \"smoke\"?", opts:["<filter>","<groups><run><include name=\"smoke\"/></run></groups>","<tags include=\"smoke\"/>","<smoke-only>true</smoke-only>"], correct:1, explain:"The <groups><run><include name=\"smoke\"/></run></groups> block filters execution to only methods tagged with that group."},
{q:"Which is the correct way to feed the SAME test method 10 different rows of input data automatically?", opts:["invocationCount = 10","@DataProvider","threadPoolSize = 10","@Parameters with 10 values"], correct:1, explain:"@DataProvider supplies rows of data; the test method runs once per row automatically. invocationCount repeats with the SAME data, not different data."},
{q:"In a parallel Selenium suite, what's the recommended way to avoid multiple threads sharing one browser instance?", opts:["Use a static WebDriver field","Use ThreadLocal<WebDriver>","Use Thread.sleep() between tests","Disable parallel execution entirely"], correct:1, explain:"ThreadLocal<WebDriver> gives each thread its own isolated WebDriver instance, which is essential once parallel execution is enabled."},
{q:"Which listener interface would you implement to auto-capture a screenshot when any test fails?", opts:["IReporter","ISuiteListener","ITestListener","IAnnotationTransformer"], correct:2, explain:"ITestListener has an onTestFailure(ITestResult result) method — the standard hook for capturing screenshots or logging on failure."},
{q:"What does the retryAnalyzer attribute on @Test do?", opts:["Runs the test faster","Automatically re-runs a failed test up to a defined limit","Skips flaky tests entirely","Increases the test's priority"], correct:1, explain:"A class implementing IRetryAnalyzer tells TestNG whether to re-attempt a failed test, useful for absorbing genuine environmental flakiness."},
{q:"threadPoolSize on a @Test method only has an effect when combined with which other attribute?", opts:["priority","groups","invocationCount","dependsOnMethods"], correct:2, explain:"threadPoolSize controls how many concurrent invocations run — it needs invocationCount to have multiple invocations to parallelize in the first place."},
{q:"Which attribute fails a test automatically if it runs longer than a specified duration?", opts:["timeOut","maxDuration","invocationTimeOut","deadline"], correct:0, explain:"timeOut (in milliseconds) fails the test if it exceeds that duration, preventing a hung test from stalling the whole suite. invocationTimeOut is the related attribute for the TOTAL time across repeated invocationCount runs."},
{q:"@BeforeTest is scoped to which element in testng.xml?", opts:["The <suite> tag","The <test> tag (can span multiple classes)","A single @Test method","A single Java class only"], correct:1, explain:"@BeforeTest runs once per <test> tag in testng.xml, which can group several classes together — unlike @BeforeClass, which is scoped to one class."},
{q:"In Assert.assertEquals(actual, expected), what is the correct argument order?", opts:["expected, then actual","actual, then expected","order doesn't matter","message, then actual, then expected"], correct:1, explain:"TestNG's convention is assertEquals(actual, expected) — actual value first. Reversing it doesn't break the check, but it makes the failure report's message misleading."},
{q:"What's the main architectural benefit of the Page Object Model in a TestNG + Selenium framework?", opts:["It makes tests run in parallel automatically", "It separates element locators/page logic from test/assertion logic, so a UI change touches one place", "It removes the need for testng.xml", "It replaces the need for assertions"], correct:1, explain:"POM isolates \"how to interact with a page\" from \"what to verify,\" so a locator change only requires updating one page class instead of every test touching that page."},
]; // END_QUIZ

/* =========================================================
   RENDER ENGINE
   ========================================================= */
const mainInner = document.getElementById('mainInner');
let currentId = null;
const visited = new Set();
let quizIndex = 0;
let quizAnswers = new Array(QUIZ_DATA.length).fill(null);

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function pad2(n){ return String(n).padStart(2,'0'); }

function chevronSvg(cls){
  return `<svg class="${cls}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;
}

function buildSidebar(filter){
  filter = filter || '';
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search';
  searchWrap.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="searchInput" placeholder="Search topics…">`;
  sidebar.appendChild(searchWrap);
  const input = searchWrap.querySelector('#searchInput');
  input.value = filter;
  input.addEventListener('input', (e)=>{
    const val = e.target.value;
    const caret = e.target.selectionStart;
    buildSidebar(val);
    const newInput = document.getElementById('searchInput');
    newInput.focus();
    try{ newInput.setSelectionRange(caret, caret); }catch(err){}
  });

  const lowerFilter = filter.toLowerCase();
  GROUPS.forEach(g=>{
    const items = topics.filter(t=> t.group===g.id && (lowerFilter==='' || t.title.toLowerCase().includes(lowerFilter)));
    if(items.length===0) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    const doneCount = items.filter(i=>visited.has(i.id)).length;
    const head = document.createElement('div');
    head.className = 'group-head';
    head.innerHTML = `${chevronSvg('caret')}<span class="gname">${esc(g.name)}</span><span class="gcount">${doneCount}/${items.length}</span>`;
    head.addEventListener('click', ()=> groupEl.classList.toggle('collapsed'));
    groupEl.appendChild(head);

    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'group-items';
    items.forEach(t=>{
      const it = document.createElement('div');
      it.className = 'item' + (t.id===currentId ? ' active' : '') + (visited.has(t.id) ? ' done' : '');
      it.innerHTML = `<span class="status"></span><span class="tnum">${pad2(t.num)}</span><span>${esc(t.title)}</span>`;
      it.addEventListener('click', ()=> selectTopic(t.id));
      itemsWrap.appendChild(it);
    });
    groupEl.appendChild(itemsWrap);
    sidebar.appendChild(groupEl);
  });
}

function updateSummary(){
  document.getElementById('sumTotal').textContent = topics.length;
  document.getElementById('sumPass').textContent = visited.size;
  const pct = Math.round((visited.size/topics.length)*100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function topicHeader(topic){
  const group = GROUPS.find(g=>g.id===topic.group);
  return `
    <div class="eyebrow">${esc(group.name)}<span class="sep">›</span>TEST ${pad2(topic.num)} / 24</div>
    <h1 class="topic-title">${esc(topic.title)}</h1>
    <p class="topic-dek">${esc(topic.dek)}</p>
    <div class="statusline"><span class="pill pass">✓ marked as read</span><span>testng-suite-runner.study</span></div>
  `;
}

function navFooterHtml(topic){
  const idx = topics.findIndex(t=>t.id===topic.id);
  const prev = topics[idx-1];
  const next = topics[idx+1];
  return `<div class="topic-nav">
    <div class="nav-btn${prev?'':' disabled'}" ${prev?`onclick="selectTopic('${prev.id}')"`:''}>
      ${prev?`<div class="nlabel">← Previous</div><div class="ntitle">${esc(prev.title)}</div>`:''}
    </div>
    <div class="nav-btn next${next?'':' disabled'}" ${next?`onclick="selectTopic('${next.id}')"`:''}>
      ${next?`<div class="nlabel">Next →</div><div class="ntitle">${esc(next.title)}</div>`:''}
    </div>
  </div>`;
}

function selectTopic(id){
  currentId = id;
  visited.add(id);
  const topic = topics.find(t=>t.id===id);
  if(topic.type==='interview') renderInterview(topic);
  else if(topic.type==='quiz') renderQuiz(topic);
  else renderTopic(topic);
  buildSidebar(document.getElementById('searchInput') ? document.getElementById('searchInput').value : '');
  updateSummary();
  document.getElementById('main').scrollTop = 0;
  closeMobileSidebar();
}

function renderTopic(topic){
  mainInner.innerHTML = topicHeader(topic) + `<div class="prose">${topic.html}</div>` + navFooterHtml(topic);
}

function renderInterview(topic){
  let body = `<div class="prose">`;
  QA_DATA.forEach((qa,i)=>{
    body += `<div class="acc-item" id="acc-${i}">
      <div class="acc-q" onclick="toggleAcc(${i})"><span class="qnum">Q${i+1}</span><span class="qtext">${esc(qa.q)}</span>${chevronSvg('qcaret')}</div>
      <div class="acc-a"><div class="acc-a-inner"><p>${esc(qa.a)}</p></div></div>
    </div>`;
  });
  body += `</div>`;
  mainInner.innerHTML = topicHeader(topic) + body + navFooterHtml(topic);
}
function toggleAcc(i){
  document.getElementById('acc-'+i).classList.toggle('open');
}

function renderQuiz(topic){
  let body = `<div class="quiz-wrap">`;
  if(quizIndex >= QUIZ_DATA.length){
    const score = quizAnswers.filter(a=>a && a.correct).length;
    const pct = Math.round(score/QUIZ_DATA.length*100);
    const msg = pct>=80 ? 'Strong grasp — you\u2019re close to interview ready.'
              : pct>=50 ? 'Solid foundation — revisit the topics behind your missed questions before your interview.'
              : 'Worth another pass through the suite topics before retaking this.';
    body += `<div class="quiz-card quiz-result">
      <div class="score">${score}/${QUIZ_DATA.length}</div>
      <div class="scoretag">Total tests run: ${QUIZ_DATA.length}  ·  Passes: ${score}  ·  Failures: ${QUIZ_DATA.length-score}</div>
      <p>${esc(msg)}</p>
      <button class="quiz-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>`;
  } else {
    const q = QUIZ_DATA[quizIndex];
    const answer = quizAnswers[quizIndex];
    body += `<div class="quiz-progress"><span>Question ${quizIndex+1} of ${QUIZ_DATA.length}</span><div class="quiz-dots">`;
    QUIZ_DATA.forEach((_,i)=>{
      let cls = 'qdot';
      const a = quizAnswers[i];
      if(a) cls += a.correct ? ' correct' : ' incorrect';
      body += `<span class="${cls}"></span>`;
    });
    body += `</div></div>`;
    body += `<div class="quiz-card">
      <div class="quiz-assert">Assert.assertEquals(yourAnswer, expected) →</div>
      <div class="quiz-q">${esc(q.q)}</div>
      <div class="quiz-opts">`;
    q.opts.forEach((opt,i)=>{
      let cls = 'qopt' + (answer ? ' disabled' : '');
      if(answer){
        if(i===q.correct) cls += ' correct';
        else if(i===answer.selected) cls += ' incorrect';
      }
      body += `<div class="${cls}" onclick="answerQuiz(${i})"><span class="letter">${String.fromCharCode(65+i)}</span><span>${esc(opt)}</span></div>`;
    });
    body += `</div>`;
    if(answer){
      body += `<div class="quiz-feedback show ${answer.correct?'pass':'fail'}">${answer.correct ? 'PASS — correct.' : 'FAIL — expected ' + String.fromCharCode(65+q.correct) + ') ' + esc(q.opts[q.correct])}
        <div class="quiz-explain">${esc(q.explain)}</div></div>`;
    }
    body += `<div class="quiz-footer">
      <button class="quiz-btn" onclick="prevQuiz()" ${quizIndex===0?'disabled':''}>← Previous</button>
      <button class="quiz-btn" onclick="nextQuiz()" ${answer?'':'disabled'}>${quizIndex===QUIZ_DATA.length-1?'See results':'Next →'}</button>
    </div>`;
    body += `</div>`;
  }
  body += `</div>`;
  mainInner.innerHTML = topicHeader(topic) + body;
}
function answerQuiz(i){
  const q = QUIZ_DATA[quizIndex];
  quizAnswers[quizIndex] = { selected:i, correct: i===q.correct };
  renderQuiz(topics.find(t=>t.id==='quiz'));
}
function nextQuiz(){ quizIndex++; renderQuiz(topics.find(t=>t.id==='quiz')); }
function prevQuiz(){ quizIndex = Math.max(0, quizIndex-1); renderQuiz(topics.find(t=>t.id==='quiz')); }
function restartQuiz(){
  quizIndex = 0;
  quizAnswers = new Array(QUIZ_DATA.length).fill(null);
  renderQuiz(topics.find(t=>t.id==='quiz'));
}

function copyCode(btn){
  const block = btn.closest('.code-block').querySelector('pre.code');
  const text = block.innerText;
  function done(){
    const old = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  cb();
}

function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
document.getElementById('menuBtn').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

/* Init */
buildSidebar();
selectTopic('intro');
</script>
</body>
